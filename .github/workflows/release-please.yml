name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Default: least privilege. Grant only what each job needs.
permissions: {}

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      # Run release-please as the krolik-release-bot GitHub App, NOT GITHUB_TOKEN.
      # A release PR opened with GITHUB_TOKEN does NOT trigger workflows (the
      # recursion guard) — preflight never runs and the required check blocks
      # merge. An App-opened PR gets CI runs. App ID/key wired via repo var+secret.
      - uses: actions/create-github-app-token@v2
        id: bot-token
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
      - name: Run release-please
        uses: googleapis/release-please-action@v5.0.0
        id: release
        with:
          token: ${{ steps.bot-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
